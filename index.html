<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Produtos</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header{
    background: linear-gradient(90deg, #b35a00, #ff7b00);
    padding: 25px 15px;
    text-align: center;
}

header h1{
    font-size: 32px;
    margin-bottom: 10px;
}

/* LOGO (corrigido) */
header img{
    max-width: 220px;
    height: auto;
    object-fit: contain;
    margin-top: 10px;
}

/* MAIN */
main{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 15px;
}

/* FORM */
form{
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 18px;
}

/* INPUTS */
select, input[type="text"]{
    padding: 12px;
    border-radius: 10px;
    border: none;
}

/* BOTÕES */
input[type="button"]{
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ff7b00;
    color: white;
    cursor: pointer;
}

/* RESULTADO (corrigido sem heading vazio) */
#resultado{
    margin-top: 20px;
    font-size: 18px;
}

/* IMAGEM (corrigido src inválido) */
#imagem{
    width: 240px;
    margin-top: 15px;
}

/* FOOTER */
footer{
    text-align: center;
    padding: 15px;
    background: #000;
}
</style>

</head>

<body>

<header>
    <h1>🍔 Catálogo de Pedidos</h1>

    <!-- ❗ CORRIGIDO: SEM ESPAÇO NO NOME DO ARQUIVO -->
    <img src="./logo.png" alt="Logo do catálogo">
</header>

<main>

<section>
    <form name="Escolha_de_pedidos">

        <h2>Menu de pedidos</h2>

        <label for="ProdutosSELECT">Tipos de produtos</label>

        <select id="ProdutosSELECT">
            <option value="Hamburguer">Hamburguer</option>
            <option value="Pizza">Pizza Tradicional</option>
            <option value="Salgadinho">Salgadinho</option> 
            <option value="Coca_cola">Coca cola</option>
        </select>

        <input type="text" placeholder="(Opcional) Digite o produto desejado" name="txtProduto">

        <input type="button" value="Adicionar produto" onclick="P()">
        <input type="button" value="Limpar pedido" onclick="C()">

    </form>
</section>

<section>

    <!-- ❗ CORRIGIDO: NÃO MAIS VAZIO -->
    <h3 id="resultado">Pedidos: nenhum</h3>

    <!-- ❗ CORRIGIDO: src inicial válido -->
    <img id="imagem" src="./img/placeholder.png" alt="Produto">

</section>

</main>

<footer>
    <p>© 2026 - Catálogo de Pedidos</p>
</footer>

<script>
let pedidos = []

function P(){
    let select = document.getElementById("ProdutosSELECT").value
    let digitado = document.Escolha_de_pedidos.txtProduto.value.trim()

    let produtoFinal = digitado !== "" ? digitado : select

    pedidos.push(produtoFinal)

    document.getElementById("resultado").innerHTML =
    "Pedidos: " + pedidos.join(", ")

    switch(select){
        case "Hamburguer":
            document.getElementById("imagem").src="./img/hb.webp"
            break;
        case "Pizza":
            document.getElementById("imagem").src="./img/pz.webp"
            break;
        case "Salgadinho":
            document.getElementById("imagem").src="./img/gp.webp"
            break;
        case "Coca_cola":
            document.getElementById("imagem").src="./img/cola.webp"
            break;
    }
}

function C(){
    pedidos = []
    document.getElementById("resultado").innerHTML = "Pedidos: nenhum"
    document.Escolha_de_pedidos.txtProduto.value = ""
    document.getElementById("imagem").src = "./img/placeholder.png"
}
</script>

</body>
</html>
